<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>بصرفه | آفلاین هستید</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family:
          Vazirmatn,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f8faf7;
        color: #0f172a;
        padding: 24px;
      }

      main {
        max-width: 420px;
        width: 100%;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 28px;
        padding: 24px;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.1);
      }

      .brand {
        display: inline-grid;
        place-items: center;
        width: 48px;
        height: 48px;
        border-radius: 18px;
        background: #ccfbf1;
        color: #115e59;
        font-weight: 800;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
        line-height: 1.5;
      }

      p {
        margin: 0;
        line-height: 1.9;
        color: #475569;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">ب</div>
      <h1>آفلاین هستید</h1>
      <p>
        اگر قبلاً بصرفه را باز کرده باشید، صفحه اصلی و ذخیره‌شده‌ها پس از بارگذاری اولیه
        در حالت آفلاین هم در دسترس خواهند بود. لطفاً اتصال اینترنت را بررسی کنید و دوباره تلاش کنید.
      </p>
    </main>
  </body>
</html>
